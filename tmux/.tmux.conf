set -sg escape-time 0

set -g default-terminal "screen-256color"

set -ga terminal-overrides ",xterm-256color*:Tc"

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
#set -g status-style 'bg=#B39DDB fg=#FFFFFF'
#set -g status-style 'bg=#D8BFD8 fg=#FFFFFF'
set -g status-style 'bg=#E6E6FA fg=#333333'  # darker text works better here




bind r source-file ~/.tmux.conf
set -g base-index 1

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# vim-like pane switching
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

bind -r T split-window -b -p 35 -h -c "#{pane_current_path}" "[[ -e TODO.md ]] && nvim TODO.md || nvim ~/Personal/todos.md"

# prefix + g : open lazygit in a popup for the current pane's directory
bind-key g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"

# tmux-opencode-session-manager
# prefix + y : launch/attach an opencode popup for the current dir
# prefix + u : open the picker of running opencode sessions
# State persists: popups attach to per-directory detached sessions on a
# dedicated tmux socket that stay alive when the popup is closed.
run-shell ~/.config/tmux/plugins/tmux-opencode-session-manager/opencode_session_manager.tmux




set -g default-command /usr/bin/zsh

