general.import = [ "~/.config/omarchy/current/theme/alacritty.toml" ]

[env]
TERM = "xterm-256color"

[font]
normal = { family = "Ubuntu Sans Mono", style = "SemiBold" }
bold   = { family = "Ubuntu Sans Mono", style = "Bold" }
italic = { family = "Ubuntu Sans Mono", style = "SemiBold Italic" }
size = 9

[window]
opacity = 0.95
padding.x = 20
padding.y = 20
decorations = "None"

[keyboard]
bindings = [
{ key = "F11", action = "ToggleFullscreen" },
{ key = "Insert", mods = "Shift", action = "Paste" },
{ key = "Insert", mods = "Control", action = "Copy" }
]
